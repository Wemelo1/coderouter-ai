<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeRouter AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #7C3AED;
    --primary-light: #A78BFA;
    --primary-dark: #5B21B6;
    --accent: #0891B2;
    --accent-light: #22D3EE;
    --bg: #0E0E1A;
    --surface: #16162A;
    --surface-2: #1E1E3A;
    --surface-3: #2A2A4A;
    --border: #2E2E50;
    --text: #E6EDF3;
    --text-dim: #8B949E;
    --text-muted: #5A5A7A;
    --green: #3FB950;
    --red: #F85149;
    --radius: 10px;
    --font-heading: 'Space Grotesk', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  header .logo {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  header h1 {
    font-family: var(--font-heading);
    font-size: 16px; font-weight: 600;
  }
  header .badge {
    font-size: 9px; font-weight: 500;
    padding: 2px 8px; border-radius: 999px;
    background: var(--surface-2); color: var(--text-dim);
    border: 1px solid var(--border);
    letter-spacing: .3px; text-transform: uppercase;
  }
  header .spacer { flex: 1; }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .chat-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .welcome {
    text-align: center;
    padding: 32px 24px 16px;
    color: var(--text-dim);
    max-width: 480px;
    margin: auto;
  }
  .welcome .icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin: 0 auto 12px;
  }
  .welcome h2 {
    font-family: var(--font-heading);
    font-size: 20px; color: var(--text);
    margin-bottom: 5px; font-weight: 600;
  }
  .welcome p { font-size: 13px; line-height: 1.5; margin-bottom: 18px; }
  .welcome .suggestions {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 7px;
  }
  .welcome .suggestions button {
    padding: 6px 13px; border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--text-dim);
    font-family: var(--font-body); font-size: 12px;
    cursor: pointer; transition: all .2s;
  }
  .welcome .suggestions button:hover {
    border-color: var(--primary); color: var(--text); background: var(--surface-2);
  }

  .msg {
    max-width: 720px;
    animation: msgIn .3s ease;
    display: flex; flex-direction: column;
  }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg .bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    line-height: 1.65;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    border-bottom-right-radius: 3px;
  }
  .msg.assistant .bubble {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }
  .msg .bubble pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px; margin: 6px 0; overflow-x: auto;
  }
  .msg .bubble code {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12.5px;
  }
  .msg .bubble pre code { background: none; padding: 0; border: none; }
  .msg .bubble :not(pre) > code {
    background: var(--surface-3);
    padding: 1px 5px; border-radius: 4px;
  }
  .msg .bubble strong { font-weight: 600; }

  .msg .meta {
    display: flex; align-items: center; gap: 8px;
    margin-top: 4px; padding: 0 4px;
    font-size: 10.5px; color: var(--text-dim);
  }
  .meta .route-local { color: var(--green); }
  .meta .route-remote { color: var(--red); }

  .typing-indicator { align-self: flex-start; }
  .typing-indicator .bubble {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
    display: flex; gap: 5px;
    padding: 13px 17px;
  }
  .typing-indicator .bubble span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: pulse 1.3s infinite;
  }
  .typing-indicator .bubble span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator .bubble span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: .25; transform: scale(.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 24px 14px;
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 8px;
    max-width: 760px;
    align-items: flex-end;
  }
  .input-row .input-wrap { flex: 1; position: relative; }
  .input-row input {
    width: 100%;
    padding: 10px 15px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px; outline: none;
    transition: border .2s;
  }
  .input-row input:focus { border-color: var(--primary); }
  .input-row input::placeholder { color: var(--text-muted); }
  .input-row button {
    padding: 10px 18px;
    border-radius: var(--radius);
    border: none;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    font-family: var(--font-heading);
    font-weight: 600; font-size: 13px;
    cursor: pointer; white-space: nowrap;
    transition: opacity .2s, transform .15s;
  }
  .input-row button:hover { opacity: .9; }
  .input-row button:active { transform: scale(.97); }
  .input-row button:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  .stats-col {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }
  .stats-col h3 {
    font-family: var(--font-heading);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
  }
  .stat-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .stat-card .label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .stat-card .value {
    font-family: var(--font-heading);
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-card .sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 13px;
  }
  .stat-row .stat-label {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-row .stat-val {
    font-family: var(--font-heading);
    font-weight: 600;
  }

  .stat-row + .stat-row {
    border-top: 1px solid var(--border);
  }

  .progress-bar {
    height: 6px;
    border-radius: 3px;
    background: var(--surface-3);
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-bar .fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transition: width .4s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  @media (max-width: 768px) {
    .stats-col { display: none; }
    #chat { padding: 16px; }
    .input-area { padding: 10px 16px 12px; }
    .msg { max-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <h1>CodeRouter AI</h1>
  <span class="badge">v2.0</span>
  <span class="spacer"></span>
  <span style="font-size:11px;color:var(--text-dim);display:flex;gap:10px">
    <span>🟢 Free</span>
    <span>🔴 Credits</span>
  </span>
</header>

<div class="layout">
  <div class="chat-col">
    <div id="chat">
      <div class="welcome" id="welcome">
        <div class="icon">⚡</div>
        <h2>CodeRouter AI</h2>
        <p>Cost-aware coding assistant — routes tasks between local (free) and remote (credits) models based on complexity</p>
        <div class="suggestions">
          <button onclick="sendSuggestion(this)">Write a Fibonacci function in Python</button>
          <button onclick="sendSuggestion(this)">Explain the SOLID principles</button>
          <button onclick="sendSuggestion(this)">Debug: index out of range in Go</button>
          <button onclick="sendSuggestion(this)">Design a REST API structure</button>
        </div>
      </div>
    </div>
    <div class="input-area">
      <form class="input-row" id="form" onsubmit="return sendMessage(event)">
        <div class="input-wrap">
          <input type="text" id="input" placeholder="Ask a coding question..." autofocus>
        </div>
        <button type="submit" id="sendBtn">Send</button>
      </form>
    </div>
  </div>

  <div class="stats-col" id="statsCol">
    <h3>Session Stats</h3>

    <div class="stat-card">
      <div class="label">Total Queries</div>
      <div class="value" id="statTotal">0</div>
    </div>

    <div style="display:flex;gap:10px">
      <div class="stat-card" style="flex:1">
        <div class="label">🟢 Local</div>
        <div class="value" id="statLocal" style="font-size:20px">0</div>
      </div>
      <div class="stat-card" style="flex:1">
        <div class="label">🔴 Remote</div>
        <div class="value" id="statRemote" style="font-size:20px">0</div>
      </div>
    </div>

    <div class="stat-card">
      <div class="label">💰 Total Saved</div>
      <div class="value" id="statSaved" style="font-size:20px">$0.00</div>
      <div class="sub" id="statSpent">Spent: $0.00</div>
    </div>

    <div class="stat-card">
      <div class="label">Handled Locally</div>
      <div class="progress-bar">
        <div class="fill" id="statBar" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span id="statPct">0%</span>
        <span id="statCount">0 / 0</span>
      </div>
    </div>
  </div>
</div>

<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const welcome = document.getElementById('welcome');

  const elTotal = document.getElementById('statTotal');
  const elLocal = document.getElementById('statLocal');
  const elRemote = document.getElementById('statRemote');
  const elSaved = document.getElementById('statSaved');
  const elSpent = document.getElementById('statSpent');
  const elBar = document.getElementById('statBar');
  const elPct = document.getElementById('statPct');
  const elCount = document.getElementById('statCount');

  async function fetchStats() {
    try {
      const res = await fetch('/api/stats');
      if (!res.ok) return;
      const s = await res.json();
      elTotal.textContent = s.total_queries;
      elLocal.textContent = s.local_queries;
      elRemote.textContent = s.remote_queries;
      elSaved.textContent = '$' + s.total_saved.toFixed(6);
      elSpent.textContent = 'Spent: $' + s.total_spent.toFixed(6);
      const pct = s.total_queries > 0 ? Math.round((s.local_queries / s.total_queries) * 100) : 0;
      elBar.style.width = pct + '%';
      elPct.textContent = pct + '%';
      elCount.textContent = s.local_queries + ' / ' + s.total_queries;
    } catch (_) {}
  }

  function addMessage(role, text, model_choice, complexity_score, tokens, cost_saved, cost_incurred) {
    welcome.style.display = 'none';

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const rendered = text
      .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    bubble.innerHTML = rendered;
    div.appendChild(bubble);

    if (role === 'assistant' && model_choice) {
      const meta = document.createElement('div');
      meta.className = 'meta';
      const isLocal = model_choice === 'local';
      meta.innerHTML = `<span class="${isLocal ? 'route-local' : 'route-remote'}">${isLocal ? '🟢' : '🔴'}</span> ${isLocal ? 'Local' : 'Remote'} model · ${complexity_score}/5 complexity · ${tokens} tokens · Saved $${cost_saved} · Spent $${cost_incurred}`;
      div.appendChild(meta);
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg typing-indicator';
    div.id = 'typing-indicator';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function sendSuggestion(btn) {
    input.value = btn.textContent;
    sendMessage(new Event('submit'));
  }

  function handleError(err) {
    removeTyping();
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = `<div class="bubble">⚠️ <strong>Connection Error</strong><br><br>${err.message}<br><br>Make sure the server is running (<code>python server.py</code>)</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    sendBtn.disabled = false;
    input.focus();
  }

  async function sendMessage(e) {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return false;

    addMessage('user', text);
    input.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: text })
      });
      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      const data = await res.json();
      removeTyping();
      addMessage(
        'assistant',
        data.response,
        data.model_choice,
        data.complexity_score,
        data.tokens,
        data.cost_saved.toFixed(6),
        data.cost_incurred.toFixed(6)
      );
      fetchStats();
    } catch (err) {
      handleError(err);
    }

    sendBtn.disabled = false;
    input.focus();
    return false;
  }

  fetchStats();
</script>
</body>
</html>
