version: '3.8'

services:

  # ── Ollama: local model runner ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: coderouter-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Pull the local model once on startup ──────────────────────────
  model-pull:
    image: ollama/ollama:latest
    container_name: coderouter-model-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5-coder:1.5b"]
    restart: "no"

  # ── CodeRouter AI app ─────────────────────────────────────────────
  app:
    build: .
    container_name: coderouter-app
    ports:
      - "8000:8000"
    env_file:
      - .env                          # contains FIREWORKS_API_KEY
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
      model-pull:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  ollama_data:
