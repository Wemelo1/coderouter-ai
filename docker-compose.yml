version: '3.8'

services:
  coderouter:
    build: .
    container_name: coderouter-ai
    ports:
      - "8000:8000"
    environment:
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - FIREWORKS_MODEL=${FIREWORKS_MODEL:-accounts/fireworks/models/glm-5p2}
      - COMPLEXITY_THRESHOLD=${COMPLEXITY_THRESHOLD:-3}
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./coderouter.db:/app/coderouter.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
